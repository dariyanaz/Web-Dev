<div class="app-wrapper">

  <header class="header">
    <h1 class="logo">Dariya <span class="accent">KZ</span></h1>
    <p class="subtitle">Лучшие технологии по выгодным ценам</p>
  </header>

  <nav class="categories">
    @for (category of categories; track category.id) {
      <button
        class="category-btn"
        [class.active]="selectedCategoryId() === category.id"
        (click)="selectCategory(category.id)"
      >
        {{ category.name }}
      </button>
    }
  </nav>

  <main class="content">
    @if (selectedCategoryId() === null) {
      <div class="welcome">
        <span class="welcome-icon">👆</span>
        <p>Выберите категорию чтобы увидеть товары</p>
      </div>
    } @else {
      <div class="catalog">
        <h2 class="catalog-title">{{ selectedCategory()?.name }}</h2>
        <app-product-list [products]="filteredProducts()" />
      </div>
    }
  </main>

</div>
