@if (displayedProducts().length > 0) {
  <div class="grid">
    @for (product of displayedProducts(); track product.id) {
      <app-product-item [product]="product" (delete)="onDelete($event)" />
    }
  </div>
} @else {
  <div class="empty">
    <span>😔</span>
    <p>В этой категории нет товаров</p>
  </div>
}
